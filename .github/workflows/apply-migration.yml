name: Apply platform migration (one-time)

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Apply 001_schema.sql to Supabase
    runs-on: ubuntu-latest
    steps:
      - name: Get service role key from Management API
        id: keys
        env:
          ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          echo "project=$PROJECT_REF" >> $GITHUB_OUTPUT

      - name: Apply migration via Management API
        env:
          ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          cat > /tmp/migration.sql << 'SQLEOF'
          -- profiles
          CREATE TABLE IF NOT EXISTS profiles (
            id UUID PRIMARY KEY REFERENCES auth.users(id) ON DELETE CASCADE,
            email TEXT NOT NULL,
            full_name TEXT,
            avatar_url TEXT,
            phone TEXT,
            locale TEXT DEFAULT 'fr',
            created_at TIMESTAMPTZ DEFAULT now(),
            updated_at TIMESTAMPTZ DEFAULT now(),
            deleted_at TIMESTAMPTZ,
            gdpr_consent_given BOOLEAN DEFAULT false,
            gdpr_consent_date TIMESTAMPTZ,
            gdpr_consent_version TEXT
          );

          CREATE TABLE IF NOT EXISTS organizations (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            name TEXT NOT NULL,
            slug TEXT UNIQUE NOT NULL,
            logo_url TEXT,
            billing_email TEXT,
            owner_id UUID REFERENCES profiles(id),
            created_at TIMESTAMPTZ DEFAULT now(),
            updated_at TIMESTAMPTZ DEFAULT now()
          );

          CREATE TABLE IF NOT EXISTS sites (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            org_id UUID NOT NULL REFERENCES organizations(id) ON DELETE CASCADE,
            name TEXT NOT NULL,
            slug TEXT NOT NULL,
            domain TEXT,
            config JSONB DEFAULT '{}',
            status TEXT DEFAULT 'draft' CHECK (status IN ('draft','published','maintenance','archived')),
            created_at TIMESTAMPTZ DEFAULT now(),
            updated_at TIMESTAMPTZ DEFAULT now(),
            UNIQUE(org_id, slug)
          );

          CREATE TABLE IF NOT EXISTS org_members (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            org_id UUID NOT NULL REFERENCES organizations(id) ON DELETE CASCADE,
            profile_id UUID NOT NULL REFERENCES profiles(id) ON DELETE CASCADE,
            role TEXT NOT NULL DEFAULT 'viewer' CHECK (role IN ('org_admin','site_admin','editor','viewer')),
            invited_at TIMESTAMPTZ DEFAULT now(),
            accepted_at TIMESTAMPTZ,
            invited_by UUID REFERENCES profiles(id),
            UNIQUE(org_id, profile_id)
          );

          CREATE TABLE IF NOT EXISTS site_members (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            site_id UUID NOT NULL REFERENCES sites(id) ON DELETE CASCADE,
            profile_id UUID NOT NULL REFERENCES profiles(id) ON DELETE CASCADE,
            role TEXT NOT NULL DEFAULT 'viewer' CHECK (role IN ('site_admin','editor','viewer')),
            granted_at TIMESTAMPTZ DEFAULT now(),
            granted_by UUID REFERENCES profiles(id),
            UNIQUE(site_id, profile_id)
          );

          CREATE TABLE IF NOT EXISTS pages (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            site_id UUID NOT NULL REFERENCES sites(id) ON DELETE CASCADE,
            slug TEXT NOT NULL,
            title TEXT NOT NULL,
            content JSONB DEFAULT '{}',
            seo_meta JSONB DEFAULT '{}',
            status TEXT DEFAULT 'draft' CHECK (status IN ('draft','published','archived')),
            published_at TIMESTAMPTZ,
            created_by UUID REFERENCES profiles(id),
            updated_by UUID REFERENCES profiles(id),
            created_at TIMESTAMPTZ DEFAULT now(),
            updated_at TIMESTAMPTZ DEFAULT now(),
            UNIQUE(site_id, slug)
          );

          CREATE TABLE IF NOT EXISTS media (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            site_id UUID NOT NULL REFERENCES sites(id) ON DELETE CASCADE,
            filename TEXT NOT NULL,
            original_filename TEXT NOT NULL,
            mime_type TEXT NOT NULL,
            size_bytes BIGINT NOT NULL,
            storage_path TEXT NOT NULL,
            alt_text TEXT,
            width INTEGER,
            height INTEGER,
            uploaded_by UUID REFERENCES profiles(id),
            created_at TIMESTAMPTZ DEFAULT now()
          );

          CREATE TABLE IF NOT EXISTS audit_logs (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            actor_id UUID REFERENCES profiles(id),
            org_id UUID REFERENCES organizations(id),
            action TEXT NOT NULL,
            resource_type TEXT NOT NULL,
            resource_id UUID,
            details JSONB DEFAULT '{}',
            ip_address INET,
            user_agent TEXT,
            created_at TIMESTAMPTZ DEFAULT now()
          );

          CREATE TABLE IF NOT EXISTS gdpr_consents (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            profile_id UUID NOT NULL REFERENCES profiles(id) ON DELETE CASCADE,
            consent_type TEXT NOT NULL,
            granted BOOLEAN NOT NULL DEFAULT false,
            granted_at TIMESTAMPTZ,
            revoked_at TIMESTAMPTZ,
            ip_address INET,
            consent_version TEXT NOT NULL,
            created_at TIMESTAMPTZ DEFAULT now()
          );

          CREATE TABLE IF NOT EXISTS data_exports (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            profile_id UUID NOT NULL REFERENCES profiles(id),
            status TEXT DEFAULT 'pending' CHECK (status IN ('pending','processing','ready','expired','failed')),
            requested_at TIMESTAMPTZ DEFAULT now(),
            completed_at TIMESTAMPTZ,
            download_url TEXT,
            expires_at TIMESTAMPTZ,
            format TEXT DEFAULT 'json'
          );

          -- Indexes
          CREATE INDEX IF NOT EXISTS idx_profiles_email ON profiles(email);
          CREATE INDEX IF NOT EXISTS idx_organizations_slug ON organizations(slug);
          CREATE INDEX IF NOT EXISTS idx_sites_org_id ON sites(org_id);
          CREATE INDEX IF NOT EXISTS idx_sites_domain ON sites(domain);
          CREATE INDEX IF NOT EXISTS idx_org_members_profile ON org_members(profile_id);
          CREATE INDEX IF NOT EXISTS idx_org_members_org ON org_members(org_id);
          CREATE INDEX IF NOT EXISTS idx_site_members_profile ON site_members(profile_id);
          CREATE INDEX IF NOT EXISTS idx_site_members_site ON site_members(site_id);
          CREATE INDEX IF NOT EXISTS idx_pages_site ON pages(site_id);
          CREATE INDEX IF NOT EXISTS idx_media_site ON media(site_id);
          CREATE INDEX IF NOT EXISTS idx_audit_logs_created ON audit_logs(created_at DESC);
          CREATE INDEX IF NOT EXISTS idx_audit_logs_actor ON audit_logs(actor_id);
          CREATE INDEX IF NOT EXISTS idx_audit_logs_org ON audit_logs(org_id);
          CREATE INDEX IF NOT EXISTS idx_gdpr_consents_profile ON gdpr_consents(profile_id);
          CREATE INDEX IF NOT EXISTS idx_data_exports_profile ON data_exports(profile_id);

          -- Triggers
          CREATE OR REPLACE FUNCTION update_updated_at()
          RETURNS TRIGGER LANGUAGE plpgsql AS $$
          BEGIN NEW.updated_at := now(); RETURN NEW; END; $$;

          DO $$ BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_trigger WHERE tgname = 'profiles_updated_at') THEN
              CREATE TRIGGER profiles_updated_at BEFORE UPDATE ON profiles FOR EACH ROW EXECUTE FUNCTION update_updated_at();
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_trigger WHERE tgname = 'organizations_updated_at') THEN
              CREATE TRIGGER organizations_updated_at BEFORE UPDATE ON organizations FOR EACH ROW EXECUTE FUNCTION update_updated_at();
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_trigger WHERE tgname = 'sites_updated_at') THEN
              CREATE TRIGGER sites_updated_at BEFORE UPDATE ON sites FOR EACH ROW EXECUTE FUNCTION update_updated_at();
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_trigger WHERE tgname = 'pages_updated_at') THEN
              CREATE TRIGGER pages_updated_at BEFORE UPDATE ON pages FOR EACH ROW EXECUTE FUNCTION update_updated_at();
            END IF;
          END $$;

          -- Auto-create profile on signup
          CREATE OR REPLACE FUNCTION handle_new_user()
          RETURNS TRIGGER LANGUAGE plpgsql SECURITY DEFINER SET search_path = '' AS $$
          BEGIN
            INSERT INTO public.profiles (id, email, full_name, avatar_url)
            VALUES (
              NEW.id, NEW.email,
              COALESCE(NEW.raw_user_meta_data ->> 'full_name', NEW.raw_user_meta_data ->> 'name'),
              NEW.raw_user_meta_data ->> 'avatar_url'
            );
            RETURN NEW;
          END; $$;

          DROP TRIGGER IF EXISTS on_auth_user_created ON auth.users;
          CREATE TRIGGER on_auth_user_created
            AFTER INSERT ON auth.users
            FOR EACH ROW EXECUTE FUNCTION handle_new_user();

          -- is_super_admin helper
          CREATE OR REPLACE FUNCTION is_super_admin()
          RETURNS BOOLEAN LANGUAGE sql SECURITY DEFINER STABLE AS $$
            SELECT EXISTS (SELECT 1 FROM organizations WHERE owner_id = auth.uid());
          $$;

          -- RLS
          ALTER TABLE profiles ENABLE ROW LEVEL SECURITY;
          ALTER TABLE organizations ENABLE ROW LEVEL SECURITY;
          ALTER TABLE sites ENABLE ROW LEVEL SECURITY;
          ALTER TABLE org_members ENABLE ROW LEVEL SECURITY;
          ALTER TABLE site_members ENABLE ROW LEVEL SECURITY;
          ALTER TABLE pages ENABLE ROW LEVEL SECURITY;
          ALTER TABLE media ENABLE ROW LEVEL SECURITY;
          ALTER TABLE audit_logs ENABLE ROW LEVEL SECURITY;
          ALTER TABLE gdpr_consents ENABLE ROW LEVEL SECURITY;
          ALTER TABLE data_exports ENABLE ROW LEVEL SECURITY;

          -- RLS Policies (drop if exist then create)
          DROP POLICY IF EXISTS "users_read_own_profile" ON profiles;
          CREATE POLICY "users_read_own_profile" ON profiles FOR SELECT USING (auth.uid() = id);

          DROP POLICY IF EXISTS "users_update_own_profile" ON profiles;
          CREATE POLICY "users_update_own_profile" ON profiles FOR UPDATE USING (auth.uid() = id);

          DROP POLICY IF EXISTS "org_admins_read_members" ON profiles;
          CREATE POLICY "org_admins_read_members" ON profiles FOR SELECT USING (
            EXISTS (SELECT 1 FROM org_members om JOIN org_members target ON target.profile_id = profiles.id AND target.org_id = om.org_id WHERE om.profile_id = auth.uid() AND om.role = 'org_admin')
          );

          DROP POLICY IF EXISTS "org_members_read_org" ON organizations;
          CREATE POLICY "org_members_read_org" ON organizations FOR SELECT USING (
            EXISTS (SELECT 1 FROM org_members WHERE org_members.org_id = organizations.id AND org_members.profile_id = auth.uid())
          );

          DROP POLICY IF EXISTS "org_admins_manage_org" ON organizations;
          CREATE POLICY "org_admins_manage_org" ON organizations FOR ALL USING (
            owner_id = auth.uid() OR EXISTS (SELECT 1 FROM org_members WHERE org_members.org_id = organizations.id AND org_members.profile_id = auth.uid() AND org_members.role = 'org_admin')
          );

          DROP POLICY IF EXISTS "org_members_read_sites" ON sites;
          CREATE POLICY "org_members_read_sites" ON sites FOR SELECT USING (
            EXISTS (SELECT 1 FROM org_members WHERE org_members.org_id = sites.org_id AND org_members.profile_id = auth.uid())
          );

          DROP POLICY IF EXISTS "site_admins_manage_sites" ON sites;
          CREATE POLICY "site_admins_manage_sites" ON sites FOR ALL USING (
            EXISTS (SELECT 1 FROM org_members WHERE org_members.org_id = sites.org_id AND org_members.profile_id = auth.uid() AND org_members.role IN ('org_admin', 'site_admin'))
          );

          DROP POLICY IF EXISTS "org_members_read_own" ON org_members;
          CREATE POLICY "org_members_read_own" ON org_members FOR SELECT USING (
            profile_id = auth.uid() OR EXISTS (SELECT 1 FROM org_members AS om WHERE om.org_id = org_members.org_id AND om.profile_id = auth.uid() AND om.role = 'org_admin')
          );

          DROP POLICY IF EXISTS "org_admins_manage_members" ON org_members;
          CREATE POLICY "org_admins_manage_members" ON org_members FOR ALL USING (
            EXISTS (SELECT 1 FROM org_members AS om WHERE om.org_id = org_members.org_id AND om.profile_id = auth.uid() AND om.role = 'org_admin')
          );

          DROP POLICY IF EXISTS "site_members_read_own" ON site_members;
          CREATE POLICY "site_members_read_own" ON site_members FOR SELECT USING (
            profile_id = auth.uid() OR EXISTS (SELECT 1 FROM sites s JOIN org_members om ON om.org_id = s.org_id WHERE s.id = site_members.site_id AND om.profile_id = auth.uid() AND om.role IN ('org_admin', 'site_admin'))
          );

          DROP POLICY IF EXISTS "site_admins_manage_site_members" ON site_members;
          CREATE POLICY "site_admins_manage_site_members" ON site_members FOR ALL USING (
            EXISTS (SELECT 1 FROM site_members AS sm WHERE sm.site_id = site_members.site_id AND sm.profile_id = auth.uid() AND sm.role = 'site_admin')
            OR EXISTS (SELECT 1 FROM sites s JOIN org_members om ON om.org_id = s.org_id WHERE s.id = site_members.site_id AND om.profile_id = auth.uid() AND om.role = 'org_admin')
          );

          DROP POLICY IF EXISTS "site_members_read_pages" ON pages;
          CREATE POLICY "site_members_read_pages" ON pages FOR SELECT USING (
            EXISTS (SELECT 1 FROM site_members WHERE site_members.site_id = pages.site_id AND site_members.profile_id = auth.uid())
            OR EXISTS (SELECT 1 FROM sites s JOIN org_members om ON om.org_id = s.org_id WHERE s.id = pages.site_id AND om.profile_id = auth.uid())
          );

          DROP POLICY IF EXISTS "editors_manage_pages" ON pages;
          CREATE POLICY "editors_manage_pages" ON pages FOR ALL USING (
            EXISTS (SELECT 1 FROM site_members WHERE site_members.site_id = pages.site_id AND site_members.profile_id = auth.uid() AND site_members.role IN ('site_admin', 'editor'))
            OR EXISTS (SELECT 1 FROM sites s JOIN org_members om ON om.org_id = s.org_id WHERE s.id = pages.site_id AND om.profile_id = auth.uid() AND om.role IN ('org_admin', 'site_admin'))
          );

          DROP POLICY IF EXISTS "site_members_read_media" ON media;
          CREATE POLICY "site_members_read_media" ON media FOR SELECT USING (
            EXISTS (SELECT 1 FROM site_members WHERE site_members.site_id = media.site_id AND site_members.profile_id = auth.uid())
            OR EXISTS (SELECT 1 FROM sites s JOIN org_members om ON om.org_id = s.org_id WHERE s.id = media.site_id AND om.profile_id = auth.uid())
          );

          DROP POLICY IF EXISTS "editors_manage_media" ON media;
          CREATE POLICY "editors_manage_media" ON media FOR ALL USING (
            EXISTS (SELECT 1 FROM site_members WHERE site_members.site_id = media.site_id AND site_members.profile_id = auth.uid() AND site_members.role IN ('site_admin', 'editor'))
            OR EXISTS (SELECT 1 FROM sites s JOIN org_members om ON om.org_id = s.org_id WHERE s.id = media.site_id AND om.profile_id = auth.uid() AND om.role IN ('org_admin', 'site_admin'))
          );

          DROP POLICY IF EXISTS "org_admins_read_audit" ON audit_logs;
          CREATE POLICY "org_admins_read_audit" ON audit_logs FOR SELECT USING (
            EXISTS (SELECT 1 FROM org_members WHERE org_members.org_id = audit_logs.org_id AND org_members.profile_id = auth.uid() AND org_members.role = 'org_admin')
          );

          DROP POLICY IF EXISTS "audit_insert_authenticated" ON audit_logs;
          CREATE POLICY "audit_insert_authenticated" ON audit_logs FOR INSERT WITH CHECK (auth.uid() IS NOT NULL);

          DROP POLICY IF EXISTS "users_manage_own_consents" ON gdpr_consents;
          CREATE POLICY "users_manage_own_consents" ON gdpr_consents FOR ALL USING (profile_id = auth.uid());

          DROP POLICY IF EXISTS "users_manage_own_exports" ON data_exports;
          CREATE POLICY "users_manage_own_exports" ON data_exports FOR ALL USING (profile_id = auth.uid());

          -- Backfill profiles for existing auth users that don't have a profile yet
          INSERT INTO profiles (id, email, full_name, avatar_url)
          SELECT
            u.id,
            u.email,
            COALESCE(u.raw_user_meta_data ->> 'full_name', u.raw_user_meta_data ->> 'name'),
            u.raw_user_meta_data ->> 'avatar_url'
          FROM auth.users u
          LEFT JOIN profiles p ON p.id = u.id
          WHERE p.id IS NULL;
          SQLEOF

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.supabase.com/v1/projects/$PROJECT_REF/database/query" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(cat /tmp/migration.sql | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY" | head -100

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "FATAL: Migration failed"
            exit 1
          fi

          echo "Migration applied successfully"

# GitHub Pages deployment disabled — the CMS requires server-side API routes
# which are incompatible with static export. Deploy to Vercel instead.
#
# To re-enable static export (without CMS save functionality):
#   1. Restore `output: "export"` in next.config.ts
#   2. Remove src/middleware.ts, src/app/api/, and src/app/dashboard/
#   3. Uncomment this workflow

name: Deploy to GitHub Pages (disabled)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "This workflow is disabled. Remove this input to re-enable."
        required: true

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Disabled
        run: echo "GitHub Pages deployment is disabled. Use Vercel for this project."
